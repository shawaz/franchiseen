[build]
  base = "apps/franchise-dashboard"
  publish = "dist"
  command = "npm install --no-workspaces && npm run build"

[build.environment]
  NODE_VERSION = "18"
  NPM_FLAGS = "--prefix=../../ --silent"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production.environment]
  VITE_API_URL = "https://api.franchiseen.com/api/v1"
  VITE_APP_NAME = "Franchiseen Franchise Dashboard"
  VITE_APP_VERSION = "1.0.0"

[context.deploy-preview.environment]
  VITE_API_URL = "https://api-staging.franchiseen.com/api/v1"
  VITE_APP_NAME = "Franchiseen Franchise Dashboard (Preview)"
  VITE_APP_VERSION = "1.0.0-preview"

[context.branch-deploy.environment]
  VITE_API_URL = "https://api-dev.franchiseen.com/api/v1"
  VITE_APP_NAME = "Franchiseen Franchise Dashboard (Dev)"
  VITE_APP_VERSION = "1.0.0-dev"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
