version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: franchiseen-postgres
    environment:
      POSTGRES_DB: franchiseen_platform
      POSTGRES_USER: franchiseen
      POSTGRES_PASSWORD: franchiseen_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - franchiseen-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: franchiseen-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - franchiseen-network

  # MinIO (S3-compatible storage for development)
  minio:
    image: minio/minio:latest
    container_name: franchiseen-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - franchiseen-network

  # Mailhog (Email testing)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: franchiseen-mailhog
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI
    networks:
      - franchiseen-network

  # Nginx (Reverse Proxy)
  nginx:
    image: nginx:alpine
    container_name: franchiseen-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./infrastructure/nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - api
    networks:
      - franchiseen-network

  # API Server
  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: franchiseen-api
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://franchiseen:franchiseen_dev_password@postgres:5432/franchiseen_platform
      REDIS_URL: redis://redis:6379
    ports:
      - "3001:3001"
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    depends_on:
      - postgres
      - redis
    networks:
      - franchiseen-network
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  franchiseen-network:
    driver: bridge
